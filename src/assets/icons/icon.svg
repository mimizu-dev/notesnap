<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Document / note body (white card) -->
  <rect x="26" y="22" width="60" height="76" rx="8" ry="8" fill="white" opacity="0.95"/>

  <!-- Note lines -->
  <rect x="36" y="40" width="40" height="5" rx="2.5" fill="#6366f1" opacity="0.45"/>
  <rect x="36" y="52" width="32" height="5" rx="2.5" fill="#6366f1" opacity="0.45"/>
  <rect x="36" y="64" width="36" height="5" rx="2.5" fill="#6366f1" opacity="0.45"/>

  <!-- Camera badge circle (overlapping bottom-right of note) -->
  <circle cx="84" cy="86" r="24" fill="#4f46e5"/>
  <circle cx="84" cy="86" r="24" fill="white" opacity="0.12"/>

  <!-- Camera body -->
  <rect x="70" y="80" width="28" height="20" rx="4" fill="white"/>
  <!-- Camera lens ring -->
  <circle cx="84" cy="90" r="7" fill="#5b21b6"/>
  <circle cx="84" cy="90" r="4" fill="white" opacity="0.85"/>
  <!-- Viewfinder bump -->
  <rect x="76" y="75" width="9" height="6" rx="2" fill="white"/>
  <!-- Flash dot -->
  <circle cx="93" cy="83" r="2" fill="#a5b4fc"/>
</svg>
